name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          cd theme/static_src && npm ci && npm run build
          python manage.py test
        env:
          SECRET_KEY: test-secret-key-for-ci

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment archive
        run: git archive --format=tar.gz --output=deployment.tar.gz HEAD

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Write production .env
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
        run: |
          {
            echo "SECRET_KEY=${SECRET_KEY}"
            echo "DEBUG=0"
            echo "ALLOWED_HOSTS=${ALLOWED_HOSTS}"
            echo "POSTGRES_DB=acmmanoa"
            echo "POSTGRES_USER=postgres"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
          } > .env.production

      - name: Upload and deploy on droplet
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
        run: |
          APP_DIR="${{ secrets.DO_APP_DIR || '/opt/acmmanoa-site' }}"

          scp -i ~/.ssh/deploy_key deployment.tar.gz "${DO_SSH_USER}@${DO_HOST}:/tmp/deployment.tar.gz"
          scp -i ~/.ssh/deploy_key .env.production "${DO_SSH_USER}@${DO_HOST}:/tmp/.env.production"

          ssh -i ~/.ssh/deploy_key "${DO_SSH_USER}@${DO_HOST}" bash -s <<EOF
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          mkdir -p "\$APP_DIR"
          cd "\$APP_DIR"

          tar -xzf /tmp/deployment.tar.gz
          rm -f /tmp/deployment.tar.gz

          mv /tmp/.env.production .env
          chmod 600 .env

          bash deploy/deploy.sh
          EOF

      - name: Deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment succeeded."
          else
            echo "Deployment failed."
            exit 1
          fi
