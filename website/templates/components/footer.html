{% load static %}

<footer>
  <div class="wrap-wide">
    <div class="foot-grid">

      <!-- Brand -->
      <div class="foot-brand">
        <a href="{% url 'home' %}" class="brand" style="text-decoration:none;">
          <img src="{% static 'website/acm_logo.png' %}" alt="ACM logo" style="width:28px;height:28px;">
          <span style="font-weight:700;font-size:16px;color:var(--ink);">ACM <span style="color:var(--muted);">·</span> Mānoa</span>
        </a>
        <p>The largest computer science student organization at the University of Hawaiʻi at Mānoa.</p>
      </div>

      <!-- Explore -->
      <div class="foot-col">
        <h5>Explore</h5>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'sigs_index' %}">Programs</a>
        <a href="{% url 'events' %}">Events</a>
        <a href="{% url 'sponsors' %}">Sponsors</a>
        <a href="{% url 'icspace' %}">ICSpace</a>
      </div>

      <!-- Connect -->
      <div class="foot-col">
        <h5>Connect</h5>
        <a href="https://discord.com/invite/2UU4Jfx6gB" target="_blank" rel="noopener">Discord</a>
        <a href="https://instagram.com/acmmanoa" target="_blank" rel="noopener">Instagram</a>
        <a href="https://github.com/acmmanoa" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/company/acmmanoa" target="_blank" rel="noopener">LinkedIn</a>
      </div>

      <!-- Resources -->
      <div class="foot-col">
        <h5>Resources</h5>
        <a href="https://acm.org" target="_blank" rel="noopener">ACM Global</a>
        <a href="https://www.ics.hawaii.edu" target="_blank" rel="noopener">UH ICS Dept.</a>
        <a href="{% url 'admin:index' %}">Admin</a>
      </div>

    </div>

    <div class="foot-bottom">
      <span>© <span id="footer-year"></span> ACM at UH Mānoa</span>
      <span>Made with aloha 🤙</span>
    </div>
  </div>
</footer>

<script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
