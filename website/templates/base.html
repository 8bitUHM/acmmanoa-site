{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
    {% tailwind_css %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ACM at UH Mānoa{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'website/acm_logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/air-theme.css' %}">
    {% block styles %}{% endblock %}
</head>

<body class="air">
    {% include "components/navbar.html" %}
    {% block content %}{% endblock %}
    {% include "components/footer.html" %}

    <!-- Mobile nav toggle -->
    <script>
    (function(){
      var btn = document.getElementById('nav-mobile-btn');
      var menu = document.getElementById('nav-mobile-menu');
      if(btn && menu){
        btn.addEventListener('click', function(){
          menu.classList.toggle('is-open');
          var open = menu.classList.contains('is-open');
          btn.setAttribute('aria-expanded', open);
        });
      }
    })();
    </script>

    <!-- Accordion toggle -->
    <script>
    document.querySelectorAll('.acc-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var body = btn.nextElementSibling;
        var open = body.classList.contains('open');
        // close all in same accordion
        var parent = btn.closest('.acc');
        if(parent){
          parent.querySelectorAll('.acc-body').forEach(function(b){ b.classList.remove('open'); });
          parent.querySelectorAll('.acc-btn').forEach(function(b){ b.classList.remove('open'); });
        }
        if(!open){
          body.classList.add('open');
          btn.classList.add('open');
        }
      });
    });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
