<!-- @startingPoint section="Website" subtitle="ACM redesign — 3 directions to compare" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACM Mānoa — Website Redesign Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;}
  body{background:#0c0c0e;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="DirectionCumulus.jsx"></script>
<script type="text/babel" src="DirectionPress.jsx"></script>
<script type="text/babel" src="DirectionTerminal.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { Cumulus, Press, Term } = window.ACMRedesign;

  function Frame({ w, children }) {
    // Render a direction at a fixed design width inside its artboard.
    return <div style={{ width: w, background:'#fff' }}>{children}</div>;
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="cumulus" title="A · Cumulus" subtitle="Clean & modern, Apple-minimal — warm paper, graphite, a single jade accent (the green of Mānoa valley).">
          <DCArtboard id="cumulus-d" label="Desktop · 1440" width={1440} height={3520}><Frame w={1440}><Cumulus/></Frame></DCArtboard>
          <DCArtboard id="cumulus-m" label="Mobile · 390" width={390} height={2680}><Frame w={390}><Cumulus/></Frame></DCArtboard>
        </DCSection>

        <DCSection id="press" title="B · Press" subtitle="Bold editorial — a campus computing journal. Oversized Instrument Serif, hairline rules, numbered index, electric coral.">
          <DCArtboard id="press-d" label="Desktop · 1440" width={1440} height={3340}><Frame w={1440}><Press/></Frame></DCArtboard>
          <DCArtboard id="press-m" label="Mobile · 390" width={390} height={2860}><Frame w={390}><Press/></Frame></DCArtboard>
        </DCSection>

        <DCSection id="terminal" title="C · Terminal" subtitle="Playful & techy — a developer console. All-monospace, near-black with a phosphor-lime accent, SIGs as installable packages.">
          <DCArtboard id="term-d" label="Desktop · 1440" width={1440} height={3060}><Frame w={1440}><Term/></Frame></DCArtboard>
          <DCArtboard id="term-m" label="Mobile · 390" width={390} height={3120}><Frame w={390}><Term/></Frame></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
