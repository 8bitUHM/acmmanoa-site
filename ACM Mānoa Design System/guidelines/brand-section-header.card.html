<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 40px 24px; background: var(--white); font-family: var(--font-sans); text-align:center; }
  h2 { font-size: var(--text-5xl); font-weight: var(--fw-bold); color: var(--text-strong); margin-bottom: 16px; letter-spacing: var(--tracking-tight); }
  .acm-divider { margin: 0 auto 18px; }
  p { font-size: var(--text-lg); color: var(--text-body); max-width: 540px; margin: 0 auto; line-height: var(--leading-relaxed); }
</style>
</head>
<body>
  <h2>Our <span class="acm-gradient-text">Programs</span></h2>
  <div class="acm-divider"></div>
