<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Gray scale" subtitle="Text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--white); font-family: var(--font-sans); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 56px; }
  .meta { padding: 6px 7px; background: var(--white); }
  .name { font-size: 11px; font-weight: var(--fw-semibold); color: var(--text-strong); }
  .hex { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gray-50);border:1px solid var(--gray-100)"></div><div class="meta"><div class="name">50</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><div class="name">100</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">200</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="meta"><div class="name">300</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="meta"><div class="name">400</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">500</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-600)"></div><div class="meta"><div class="name">600</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="meta"><div class="name">700</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-800)"></div><div class="meta"><div class="name">800</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="meta"><div class="name">900</div></div></div>
  </div>
</body>
</html>
