<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base — Tailwind steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--white); font-family: var(--font-sans); }
  .item { display:flex; align-items:center; gap: 14px; margin-bottom: 9px; }
  .bar { height: 14px; background: var(--gradient-divider); border-radius: 3px; }
  .lbl { font-size: 11px; color: var(--text-muted); width: 150px; }
  .lbl b { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="width:var(--space-2)"></div><div class="lbl"><b>2</b> · 8px · inline gap</div></div>
  <div class="item"><div class="bar" style="width:var(--space-4)"></div><div class="lbl"><b>4</b> · 16px</div></div>
  <div class="item"><div class="bar" style="width:var(--space-6)"></div><div class="lbl"><b>6</b> · 24px · nav / card pad</div></div>
  <div class="item"><div class="bar" style="width:var(--space-8)"></div><div class="lbl"><b>8</b> · 32px · grid gap</div></div>
  <div class="item"><div class="bar" style="width:var(--space-12)"></div><div class="lbl"><b>12</b> · 48px · panel pad</div></div>
  <div class="item"><div class="bar" style="width:var(--space-20)"></div><div class="lbl"><b>20</b> · 80px · section pad</div></div>
</body>
</html>
