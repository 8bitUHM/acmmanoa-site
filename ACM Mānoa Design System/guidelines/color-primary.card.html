<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Blue" subtitle="Brand primary; actions and links" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--white); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--white); }
  .name { font-size: 12px; font-weight: var(--fw-semibold); color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">blue-50</div><div class="hex">#eff6ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">blue-100</div><div class="hex">#dbeafe</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="name">blue-300</div><div class="hex">#93c5fd</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">blue-500</div><div class="hex">#3b82f6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">blue-600 ·primary</div><div class="hex">#2563eb</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">blue-700 ·hover</div><div class="hex">#1d4ed8</div></div></div>
  </div>
</body>
</html>
