<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="sm 8 · md 12 · lg 16 · xl 24 · full" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--white); font-family: var(--font-sans); }
  .row { display:flex; gap: 18px; align-items: flex-end; }
  .item { text-align:center; }
  .box { width: 84px; height: 64px; background: var(--blue-50); border: 2px solid var(--blue-300); }
  .lbl { margin-top: 8px; font-size: 11px; color: var(--text-muted); }
  .lbl b { display:block; color: var(--text-strong); font-size: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl"><b>sm</b>8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl"><b>md</b>12px · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl"><b>lg</b>16px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl"><b>xl</b>24px · features</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full)"></div><div class="lbl"><b>full</b>pills</div></div>
  </div>
</body>
</html>
